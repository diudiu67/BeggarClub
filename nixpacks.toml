# Railway deployment config — installs FFmpeg and Python via Nix
[phases.setup]
nixPkgs = ["ffmpeg", "python3"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /opt/venv/bin/python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
